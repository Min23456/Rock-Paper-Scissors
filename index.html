<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8"/>

    <title> Rock Paper Scissors </title>

    <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="game-box">
    <h1>Rock Paper Scissors</h1>
    <p class="subtitle">Choose one and play against the computer!</p>
    <div class="buttons">
        <button onclick="playGame('rock')">🪨 Rock</button>
        <button onclick="playGame('paper')">📝 Paper</button>
        <button onclick="playGame('scissors')">✂️ Scissors</button> 

    </div>
    <div class="results">
        <p><strong>You chose:</strong> <span id="player-choice">-</span></p>
        <p><strong>The computer chose:</strong> <span id="computer">-</span></p>
        <p><strong>Result:</strong> <span id="result-text">Start the game!</span></p>

    </div>
    <div class="score-board">
        <h2>Score</h2>
        <p>You: <span id="player-score">0</span></p>
        <p>Computer: <span id="computer-score">0</span></p>

    </div>
    <button class="reset-btn" onclick="resetGame()">Reset Game</button>

</div>
<script src="script.js"></script>


</body>
</html>
